name: Paid proof bridge

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  proof-bridge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Show node version
        run: node --version
      - name: Verify bridge
        run: node scripts/verify-paid-proof-bridge.mjs
